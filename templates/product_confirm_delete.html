<!DOCTYPE html>
<html>
<head>
    <title>Delete Product</title>
</head>
<body>
    <h1>Delete confirmation</h1>
    <p>Are you sure you want to delete <strong>"{{ object.name }}"</strong>?</p>
    
    <form method="post">
        {% csrf_token %}
        <button type="submit">Yes, delete</button>
    </form>
    
    <a href="{% url 'product_list' %}">Cancel</a>
</body>
</html>

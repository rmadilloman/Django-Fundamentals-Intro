<!DOCTYPE html>
<html>
<head>
    <title>{% if object %}Edit{% else %}New{% endif %} Product</title>
</head>
<body>
    <h1>{% if object %}Edit{% else %}Create New{% endif %} Product</h1>
    
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Save</button>
    </form>
    
    <br>
    <a href="{% url 'product_list' %}">Cancel</a>
</body>
</html>
